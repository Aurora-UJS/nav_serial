# Serial Driver Configuration
# 此配置文件用于 ROS2 参数加载

/**:
  ros__parameters:
    #=========================================================================
    # 串口配置
    #=========================================================================
    
    # 串口设备路径
    serial_port: "/dev/ttyUSB0"
    
    # 波特率 (常用: 9600, 115200, 460800, 921600)
    baud_rate: 115200
    
    # 发送频率 (Hz)
    send_rate: 100
    
    #=========================================================================
    # 重连配置
    #=========================================================================
    
    # 重连间隔 (毫秒)
    reconnect_interval_ms: 1000
    
    # 最大重连次数 (-1 表示无限重试)
    max_reconnect_attempts: -1
    
    #=========================================================================
    # ROS 配置
    #=========================================================================
    
    # TF frame IDs
    base_frame_id: "base_link"
    gimbal_frame_id: "gimbal_yaw"
    
    # 是否启用统计信息输出
    enable_statistics: false
    
    # 统计信息输出间隔 (秒)
    statistics_interval_sec: 10
